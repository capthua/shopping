#设置服务发现
spring:
  application:
    name: user-dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        file-extension: yaml
        server-addr: localhost:8848
        group: DEFAULT_GROUP
        ext-config[0]:
          data-id: public-dev.yml
          refresh: true
        ext-config[1]:
          data-id: db-dev.yml
        ext-config[2]:
          data-id: mq-dev.yml

dubbo:
  registry:
    address: nacos://127.0.0.1:8848
    timeout: 10000
  protocol:
#    -1:会分配一个没有被占用的端口，默认是20880
    port: -1
    name: dubbo
  application:
    metadata-type: remote
    name: user
    owner: capthua
  #    qos-enable: false
#    qos-port: 22222
  metadata-report:
    address: nacos://127.0.0.1:8848
