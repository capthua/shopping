#设置服务发现
spring:
  application:
    name: user-dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        file-extension: yaml
        server-addr: localhost:8848
        group: DEFAULT_GROUP
        ext-config[0]:
          data-id: public-dev.yml
          refresh: true
        ext-config[1]:
          data-id: db-dev.yml
        ext-config[2]:
          data-id: mq-dev.yml

dubbo:
  registry:
    address: nacos://127.0.0.1:8848
  protocol:
    id: rpc_user
    port: -1
  application:
    name: rpc_user   #自定义 dubbo 的应用名
    qosEnable: false