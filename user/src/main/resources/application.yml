#bootstrap会覆盖active的设置
spring:
  cloud:
    stream:
#      如果有一个binder的话,就不需要设置
      default-binder: rabbit
      binders:
        rabbit1:
          type: rabbit
          defaultCandidate: false
          inheritEnvironment: false
          environment:
            spring:
              rabbitmq:
                host: 192.168.9.202
        rabbit:
          type: rabbit
          environment:
            spring:
              rabbitmq:
                host: 192.168.9.203
      bindings:
        order:
          destination: order
          binder: rabbit1
          group: myOrderQueue
          conumer:
            concurrency: 3
        cart:
#          如果没有指定routing key,会使用默认的 #
          binder: rabbit
          destination: order
          group: myCartQueue
      # rabbit的扩展配置 RabbitExtendedBindingProperties
      rabbit:
        bindings:
          order:
            consumer:
              bindingRoutingKey: order
          cart:
            consumer:
              bindingRoutingKey: cart
  profiles:
    active: dev
