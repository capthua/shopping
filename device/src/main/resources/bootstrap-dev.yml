#设置服务发现
#  dataId 的完整格式如下
# ${prefix}-${spring.profile.active}.${file-extension}

spring:
  application:
    name: device-dev
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.70.169:8848
      config:
        file-extension: yaml
        server-addr: 192.168.70.169:8848
        group: DEFAULT_GROUP
        ext-config[0]:
          data-id: public-dev.yml
          refresh: true
        ext-config[1]:
          data-id: db-dev.yml
        ext-config[2]:
          data-id: mq-dev.yml
        ext-config[3]:
          data-id: dubbo-consumer.yml
        ext-config[4]:
          data-id: redis-dev.yml

##        单个配置文件
#        server-addr: localhost:8848
#        prefix: shopping
#        file-extension: yml
##        group默认值是DEFAULT_GROUP，可以不配置
#        group: DEFAULT_GROUP

dubbo:
  application:
    name: device


