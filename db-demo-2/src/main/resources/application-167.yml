#设置服务发现
# mysql
spring:
  datasource:
    url: jdbc:mysql://192.168.70.167:3307/test_ht?allowMultiQueries=true&characterEncoding=UTF-8
    username: root
    password: 123456

# tk.mybatis需要扫描
mapper:
  mappers:
    - com.shopping.common.db.CommonMapper

#mybatis配置文件
# classpath*:需要遍历所有的classpath
mybatis:
  mapper-locations: classpath:com/shopping/*/mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.shopping.dbdemo2.dao: debug