spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopping?serverTimezone=UTC
    username: root
    password: 242492

  #  rabbitmq
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: GHost

    # 确认消息已发送到交换机
    publisher-confirms: true
    # 消息发送失败后返回
    publisher-returns: true

    listener:
      # 默认配置是simple
      type: simple
      simple:
        # 手动ack Acknowledge mode of container.
        acknowledge-mode: manual
        # Maximum number of unacknowledged messages that can be outstanding at each consumer.
        prefetch: 3



logging:
  level:
    com.alibaba.nacos: WARN
