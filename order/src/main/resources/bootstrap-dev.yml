#设置服务发现

spring:
  application:
    name: order-dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        file-extension: yaml
        server-addr: localhost:8848
        group: DEFAULT_GROUP
        ext-config[0]:
          data-id: public-dev.yml
          refresh: true
        ext-config[1]:
          data-id: db-dev.yml
        ext-config[2]:
          data-id: mq-dev.yml
        ext-config[3]:
          data-id: redis-dev.yml
